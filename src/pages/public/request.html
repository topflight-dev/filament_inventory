<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C3DW | Submit a Print Request</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="icon" href="../../../Crafted 3D.ico" type="image/x-icon">
    <script src="../../js/api/api.js"></script>
    <style>
        /* =============================================
           GLASS PANEL — LIGHT THEME (matches admin.html)
           ============================================= */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 560px;
            margin: 30px auto;
            text-align: left;
        }

        .glass-panel h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: hsl(25, 36%, 37%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
        }

        /* =============================================
           FORM GROUPS
           ============================================= */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
            font-family: 'Inter', sans-serif;
        }

        .form-group label .optional-tag {
            font-weight: normal;
            color: #888;
            font-size: 12px;
            margin-left: 6px;
        }

        .request-input {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background: white;
            color: #333;
            border-radius: 6px;
            padding: 10px 12px;
            border: 1px solid #ccc;
            font-size: 15px;
            font-family: 'Inter', Arial, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .request-input:focus {
            outline: none;
            border-color: #ace0f9;
            box-shadow: 0 0 8px rgba(172, 224, 249, 0.6);
        }

        select.request-input {
            background: white;
            color: #333;
            cursor: pointer;
        }

        /* =============================================
           SUBMIT BUTTON
           ============================================= */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #218838;
        }

        .submit-btn:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        /* =============================================
           STATUS MESSAGE
           ============================================= */
        #statusMessage {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }

        #statusMessage.success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        #statusMessage.error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Print Request</h1>
        <p>Submit a job to the 3D print queue!</p>
    </header>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="meettheteam.html">Meet the Team</a></li>
            <li><a href="request.html" class="active">Print Request</a></li>
        </ul>
    </nav>

    <main>
        <div class="glass-panel">
            <h2>🖨️ Submit a Print Request</h2>

            <form id="requestForm" novalidate>

                <div class="form-group">
                    <label for="requestorName">Your Name</label>
                    <input
                        type="text"
                        id="requestorName"
                        class="request-input"
                        placeholder="e.g., Jane Smith"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input
                        type="text"
                        id="projectName"
                        class="request-input"
                        placeholder="e.g., Desk Organizer"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="modelLink">
                        Link to Model
                        <span class="optional-tag">(optional)</span>
                    </label>
                    <input
                        type="text"
                        id="modelLink"
                        class="request-input"
                        placeholder="e.g., https://www.thingiverse.com/thing:..."
                    >
                </div>

                <div class="form-group">
                    <label for="filamentSelect">Filament Selection</label>
                    <select id="filamentSelect" class="request-input" required>
                        <option value="" disabled selected>Loading filaments...</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">
                    🚀 Submit Request
                </button>

                <div id="statusMessage"></div>

            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const filamentSelect = document.getElementById('filamentSelect');

            // --- POPULATE FILAMENT DROPDOWN ---
            try {
                const response = await fetch(`${window.API_BASE}?cb=${Date.now()}`);
                if (!response.ok) throw new Error('Failed to fetch filaments');
                const filaments = await response.json();

                filamentSelect.innerHTML = '<option value="" disabled selected>Select a filament...</option>';

                if (Array.isArray(filaments) && filaments.length > 0) {
                    filaments
                        .filter(f => f.inStock)
                        .forEach(f => {
                            const option = document.createElement('option');
                            option.value = f.id;
                            option.textContent = `${f.color} — ${f.finish}`;
                            filamentSelect.appendChild(option);
                        });
                } else {
                    filamentSelect.innerHTML = '<option value="" disabled selected>No filaments available</option>';
                }
            } catch (err) {
                console.error('Filament load error:', err);
                filamentSelect.innerHTML = '<option value="" disabled selected>Could not load filaments</option>';
            }

            // --- FORM SUBMISSION ---
            const form = document.getElementById('requestForm');
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const requestorName = document.getElementById('requestorName').value.trim();
                const projectName = document.getElementById('projectName').value.trim();
                const stlUrl = document.getElementById('modelLink').value.trim();
                const filamentId = filamentSelect.value;

                // Basic validation
                if (!requestorName || !projectName || !filamentId) {
                    showStatus('Please fill in all required fields and select a filament.', 'error');
                    return;
                }

                // Loading state
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';
                statusMessage.style.display = 'none';

                const payload = {
                    requestor_name: requestorName,
                    project_name: projectName,
                    stl_url: stlUrl,
                    filament_id: filamentId
                };

                try {
                    const response = await fetch(window.PRINT_QUEUE_BASE, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.message || `Server error: ${response.status}`);
                    }

                    showStatus('✅ Request added to the queue!', 'success');
                    form.reset();
                    filamentSelect.selectedIndex = 0;

                } catch (err) {
                    console.error('Submission error:', err);
                    showStatus(`❌ Submission failed: ${err.message}`, 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Submit Request';
                }
            });

            function showStatus(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = type;
                statusMessage.style.display = 'block';
            }
        });
    </script>

    <script src="../../js/utils/footer.js"></script>
</body>
</html>
