<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    /* Dynamic base-path injection for web/Vercel targets.
       When served via file:// (Electron desktop), this block is skipped entirely
       so all ../../../ relative paths resolve correctly from the file system.
       When served via https:// (Vercel /hub clean URL), <base href="/"> is injected
       before any asset loads, making ../../../ paths resolve from the site root. */
    if (window.location.protocol !== 'file:') {
      var base = document.createElement('base');
      base.href = '/';
      document.head.appendChild(base);
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a1a">
  <title>Crafted 3D | Print Queue Hub</title>
  <link rel="stylesheet" href="../../../styles/style.css">
  <link rel="icon" href="../../../Crafted 3D.ico" type="image/x-icon">
  <script src="../../../js/api/api.js"></script>
  <style>
    /* =============================================
       DARK MODE BASE
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Stops the browser-level ghost scrollbar on the root viewport */
    }

    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: visible; /* Must NOT clip — hub-wrapper owns all vertical scrolling */
    }

    body {
      background: #1a1a1a;
      color: #ffffff;
      font-family: 'Inter', Arial, sans-serif;
    }

    /* Override any light-mode rules from style.css */
    header, footer {
      background: #111111 !important;
      color: #ffffff !important;
      border-color: #333 !important;
    }

    header h1, header p {
      color: #ffffff !important;
    }

    /* =============================================
       BRAND BAR (replaces nav — static, no links)
       ============================================= */
    .hub-brand-bar {
      background: #111111;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 24px;
      display: flex;
      align-items: center;
    }

    .hub-brand-title {
      font-size: 1rem;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }

    /* =============================================
       HUB LAYOUT
       ============================================= */
    .hub-wrapper {
      width: 100%;
      /* calc subtracts the header (~60px) + brand bar (~41px) + a small safety buffer = 110px total */
      height: calc(100vh - 110px);
      box-sizing: border-box;
      padding: 20px 24px 40px;
      overflow-y: auto; /* Scroll bar will ONLY appear here when print jobs overflow the screen */
      /* Firefox minimal scrollbar */
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    /* Reveal a subtle glass-accent scrollbar thumb on hover */
    .hub-wrapper:hover {
      scrollbar-color: rgba(156, 163, 175, 0.25) transparent;
    }

    /* WebKit (Chromium / Electron / Safari) — invisible track, minimal 4px thumb */
    .hub-wrapper::-webkit-scrollbar {
      width: 4px;
    }

    .hub-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }

    .hub-wrapper::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 4px;
    }

    /* Thumb appears only when the wrapper is hovered */
    .hub-wrapper:hover::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.25); /* subtle glass accent — matches #9ca3af palette */
    }

    /* Slightly more opaque while actively dragging */
    .hub-wrapper::-webkit-scrollbar-thumb:active {
      background: rgba(156, 163, 175, 0.5);
    }

    /* =============================================
       TOP CONTROL BAR
       ============================================= */
    .hub-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: #242424;
      border-radius: 12px;
      border: 1px solid #333;
    }

    .pending-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #3a2a00;
      border: 2px solid #facc15;
      border-radius: 10px;
      padding: 10px 20px;
    }

    .pending-badge .badge-label {
      font-size: 1rem;
      font-weight: 600;
      color: #facc15;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .pending-badge .badge-count {
      font-size: 2rem;
      font-weight: 900;
      color: #facc15;
      line-height: 1;
      min-width: 2ch;
      text-align: center;
    }

    .hub-btn {
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .hub-btn:active { transform: scale(0.97); }

    .hub-btn-refresh {
      background: #3B82F6;
      color: #fff;
    }
    .hub-btn-refresh:hover { background: #2563EB; }

    .hub-btn-auto {
      background: #374151;
      color: #9ca3af;
      border: 2px solid #4b5563;
    }
    .hub-btn-auto.auto-on {
      background: #14532d;
      color: #4ade80;
      border-color: #4ade80;
    }
    .hub-btn-auto.auto-on:hover { background: #166534; }
    .hub-btn-auto:not(.auto-on):hover { background: #4b5563; }

    .hub-btn-refresh:disabled {
      background: #555;
      cursor: not-allowed;
    }

    /* Delete Selected Button */
    .hub-btn-delete-selected {
      background: #7f1d1d;
      color: #fca5a5;
      border: 2px solid #ef4444;
      margin-left: auto; /* push to right side of flex row */
    }
    .hub-btn-delete-selected:hover:not(:disabled) {
      background: #991b1b;
      color: #fff;
      border-color: #f87171;
    }
    .hub-btn-delete-selected:disabled {
      background: #2a2a2a;
      color: #4b5563;
      border-color: #374151;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* =============================================
       PRINT QUEUE TABLE
       ============================================= */
    .table-container {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #333;
      background: #242424;
    }

    .queue-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .queue-table thead {
      background: #1f1f1f;
      border-bottom: 2px solid #444;
    }

    .queue-table th {
      padding: 8px 12px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      white-space: nowrap;
    }

    .queue-table th.th-checkbox,
    .queue-table td.td-checkbox {
      width: 40px;
      text-align: center;
      padding: 8px 10px;
    }

    .queue-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.15s;
    }

    .queue-table tbody tr:last-child {
      border-bottom: none;
    }

    .queue-table tbody tr:hover {
      background: #2a2a2a;
    }

    .queue-table tbody tr.row-selected {
      background: #1e2a3a;
    }

    .queue-table td {
      padding: 8px 12px;
      vertical-align: middle;
      text-align: left;
      color: #e5e7eb;
      font-size: 0.9rem;
    }

    .queue-table td.td-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #ffffff;
    }

    .queue-table td.td-project {
      color: #d1d5db;
    }

    /* Project note sub-text (appended comment) */
    .td-project-note {
      display: block;
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 3px;
      font-style: italic;
      white-space: normal;
      word-break: break-word;
    }

    /* Model link button — embedded in Project cell */
    .model-link-btn {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.72rem;
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: color 0.15s, text-decoration 0.15s;
    }
    .model-link-btn:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    /* Submission date metadata — embedded in Project cell */
    .td-submit-date {
      display: block;
      font-size: 0.72rem;
      color: #4b5563;
      margin-top: 2px;
      font-style: italic;
    }

    .queue-table td.td-filament {
      color: #9ca3af;
      font-size: 0.9rem;
    }

    /* Inline edit inputs */
    .inline-edit-input {
      background: #1a1a1a;
      border: 1px solid #4b5563;
      border-radius: 6px;
      color: #ffffff;
      font-size: 0.9rem;
      padding: 4px 8px;
      width: 100%;
      min-width: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .inline-edit-input:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.25);
    }

    /* Checkboxes */
    .job-checkbox,
    #select-all-downloads {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #3B82F6;
    }

    /* =============================================
       STATUS BADGES
       ============================================= */
    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }

    .status-pending  { background: #451a03; color: #fbbf24; border: 1px solid #92400e; }
    .status-printing { background: #1e3a5f; color: #60a5fa; border: 1px solid #1e40af; }
    .status-completed { background: #052e16; color: #4ade80; border: 1px solid #065f46; }

    /* =============================================
       OVERSIZED ACTION BUTTONS
       ============================================= */
    .action-btn {
      display: inline-block;
      min-width: 140px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      text-align: center;
      white-space: nowrap;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .action-btn:active { transform: scale(0.96); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

    .action-btn:disabled {
      background: #374151 !important;
      color: #6b7280 !important;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Pending → start printing */
    .action-btn-start {
      background: #1d4ed8;
      color: #ffffff;
    }
    .action-btn-start:hover:not(:disabled) { background: #1e40af; box-shadow: 0 6px 18px rgba(29,78,216,0.5); }

    /* Printing → mark complete */
    .action-btn-complete {
      background: #15803d;
      color: #ffffff;
    }
    .action-btn-complete:hover:not(:disabled) { background: #166534; box-shadow: 0 6px 18px rgba(21,128,61,0.5); }

    /* Completed → reset */
    .action-btn-reset {
      background: #374151;
      color: #d1d5db;
      border: 1px solid #4b5563;
    }
    .action-btn-reset:hover:not(:disabled) { background: #4b5563; }

    /* Edit button */
    .action-btn-edit {
      background: #1e3a5f;
      color: #93c5fd;
      border: 1px solid #1e40af;
      min-width: 60px;
    }
    .action-btn-edit:hover:not(:disabled) { background: #1e40af; color: #fff; }

    /* Save button */
    .action-btn-save {
      background: #14532d;
      color: #4ade80;
      border: 1px solid #065f46;
      min-width: 60px;
    }
    .action-btn-save:hover:not(:disabled) { background: #166534; color: #fff; }

    /* Cancel edit button */
    .action-btn-cancel {
      background: #374151;
      color: #9ca3af;
      border: 1px solid #4b5563;
      min-width: 60px;
    }
    .action-btn-cancel:hover:not(:disabled) { background: #4b5563; }

    /* =============================================
       EMPTY STATE
       ============================================= */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state .empty-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 1.1rem;
      margin: 0;
    }

    /* =============================================
       TOAST
       ============================================= */
    #hub-toast {
      visibility: hidden;
      min-width: 220px;
      background: #1f2937;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 14px 24px;
      position: fixed;
      z-index: 9999;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      border: 1px solid #374151;
    }

    #hub-toast.show {
      visibility: visible;
      animation: toastIn 0.35s ease, toastOut 0.4s ease 2.2s forwards;
    }

    @keyframes toastIn {
      from { bottom: 0; opacity: 0; }
      to   { bottom: 30px; opacity: 1; }
    }

    @keyframes toastOut {
      from { bottom: 30px; opacity: 1; }
      to   { bottom: 0; opacity: 0; }
    }

    /* =============================================
       BOTTOM FOOTER
       ============================================= */
    .hub-footer {
      margin-top: 36px;
      text-align: center;
      padding-bottom: 20px;
      color: #4b5563;
      font-size: 0.8rem;
    }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 640px) {
      .hub-wrapper { padding: 12px 12px 40px; }
      .hub-controls { gap: 10px; padding: 12px; }
      .queue-table th, .queue-table td { padding: 6px 8px; }
      .action-btn { min-width: 110px; font-size: 0.8rem; padding: 6px 10px; }
      .hub-btn-delete-selected { margin-left: 0; }
    }

    /* =============================================
       TABLET RESPONSIVE — BLOCK 1
       iPad Landscape & small laptops (≤1024px)
       Additive only — no existing rules modified
       ============================================= */
    @media (max-width: 1024px) {
      /* Reduce action button min-width to give the 7-column table more breathing room */
      .action-btn { min-width: 120px; }
    }

    /* =============================================
       TABLET RESPONSIVE — BLOCK 2
       iPad Portrait — PRIMARY TABLET TARGET (≤768px)
       Additive only — no existing rules modified
       ============================================= */
    @media (max-width: 768px) {
      /* FIX 1: Unlock body scroll for tablet browsers.
         On desktop Electron the window is always >768px so this never fires there.
         On iOS/Android the overflow:hidden on body locks touch-scroll entirely. */
      html, body { overflow: auto; }

      /* FIX 2: Replace rigid 100vh with safe dynamic viewport height.
         iOS Safari's 100vh includes the browser chrome, clipping bottom content.
         'auto' + min-height with dvh fallback resolves the iOS viewport bug. */
      .hub-wrapper {
        height: auto;
        min-height: calc(100vh - 60px);       /* fallback for older iOS Safari */
        min-height: calc(100dvh - 60px);      /* modern dynamic viewport height */
        padding-bottom: env(safe-area-inset-bottom, 40px); /* notch/home-bar safety */
      }

      /* FIX 3: Collapse inherited header margin to reclaim vertical space on tablet */
      header { margin: 0.5rem 0; }

      /* FIX 4: Normalize Delete button — margin-left:auto breaks on wrapped flex rows */
      .hub-btn-delete-selected { margin-left: 0; width: 100%; }

      /* FIX 5: Tighten controls bar padding and gap */
      .hub-controls { padding: 12px 14px; gap: 10px; }

      /* FIX 6: Reduce brand bar padding */
      .hub-brand-bar { padding: 8px 16px; }

      /* FIX 7: Tighten table cell padding — horizontal only.
         Vertical padding is intentionally preserved for touch-target comfort. */
      .queue-table th { padding: 8px 8px; }
      .queue-table td { padding: 7px 8px; }

      /* FIX 8: Reduce action button min-width for 7-column table on 768px viewport */
      .action-btn { min-width: 110px; font-size: 0.82rem; padding: 7px 10px; }

      /* TOUCH TARGET 1: Increase checkbox hit-box to 24×24px (finger-friendly) */
      .job-checkbox,
      #select-all-downloads {
        width: 24px;
        height: 24px;
      }

      /* TOUCH TARGET 2: Enforce 40px minimum height on all table action buttons
         (40px is the mobile touch standard per Apple HIG and Material Design) */
      .queue-table .action-btn {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }

    /* =============================================
       TABLET RESPONSIVE — BLOCK 3
       Phone augmentation (≤640px)
       Augments the existing block above — additive only
       ============================================= */
    @media (max-width: 640px) {
      /* Stack all control bar items vertically for very small screens */
      .hub-controls { flex-direction: column; align-items: stretch; }
      .hub-btn { width: 100%; justify-content: center; }
      .pending-badge { justify-content: center; }

      /* Keep Filament column visible on phones — allow text to wrap instead of hiding */
      .queue-table td.td-filament {
        white-space: normal;
        word-break: break-word;
        font-size: 0.78rem;
        max-width: 80px;
      }
      /* Tighten cell padding further on phones to prevent horizontal overflow */
      .queue-table th, .queue-table td { padding: 4px 5px; }
      /* Reduce action button min-width aggressively for phone viewports */
      .action-btn { min-width: 80px; font-size: 0.75rem; padding: 5px 6px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Crafted 3D Workshop</h1>
    <p class="slogan">🖨️ Print Queue Hub</p>
  </header>

  <div class="hub-brand-bar">
    <span class="hub-brand-title">🖨️ C3DW Print Queue Dashboard</span>
  </div>

  <div class="hub-wrapper">

    <!-- TOP CONTROL BAR -->
    <div class="hub-controls">
      <div class="pending-badge">
        <span class="badge-label">⏳ Pending</span>
        <span class="badge-count" id="pendingCount">—</span>
      </div>

      <button class="hub-btn hub-btn-refresh" id="refreshBtn" onclick="fetchQueue()">
        🔄 Manual Refresh
      </button>

      <button class="hub-btn hub-btn-auto" id="autoRefreshBtn" onclick="toggleAutoRefresh()">
        ⚫ Auto-Refresh: OFF
      </button>

      <button class="hub-btn hub-btn-delete-selected" id="deleteSelectedBtn" disabled onclick="deleteSelected()">
        🗑️ Delete Selected
      </button>
    </div>

    <!-- PRINT QUEUE TABLE -->
    <div class="table-container">
      <table class="queue-table">
        <thead>
          <tr>
            <th class="th-checkbox">
              <input type="checkbox" id="select-all-downloads" title="Select all">
            </th>
            <th>Child Name</th>
            <th>Project</th>
            <th>Filament</th>
            <th>Status</th>
            <th>Action</th>
            <th>Edit</th>
          </tr>
        </thead>
        <tbody id="queueTableBody">
          <tr>
            <td colspan="7">
              <div class="empty-state">
                <span class="empty-icon">⏳</span>
                <p>Loading queue...</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- BOTTOM FOOTER -->
    <div class="hub-footer">
      C3DW Workshop &mdash; Print Queue Manager
    </div>

  </div>

  <!-- Toast Notification -->
  <div id="hub-toast"></div>

  <script src="../../../js/utils/footer.js"></script>

  <script>
    // =============================================
    // STATE
    // =============================================
    let autoRefreshInterval = null;
    let isAutoRefreshOn = false;

    // =============================================
    // FETCH QUEUE
    // =============================================
    async function fetchQueue() {
      const btn = document.getElementById('refreshBtn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '⏳ Refreshing...';
      }

      try {
        const response = await fetch(`${window.PRINT_QUEUE_BASE}?cb=${Date.now()}`);
        if (!response.ok) throw new Error(`Server returned ${response.status}`);
        const jobs = await response.json();
        renderQueue(Array.isArray(jobs) ? jobs : []);
      } catch (err) {
        console.error('Queue fetch failed:', err);
        showToast('❌ Could not load queue');
        document.getElementById('queueTableBody').innerHTML = `
          <tr>
            <td colspan="7">
              <div class="empty-state">
                <span class="empty-icon">⚠️</span>
                <p>Failed to load queue. Check your connection.</p>
              </div>
            </td>
          </tr>`;
        document.getElementById('pendingCount').textContent = '—';
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = '🔄 Manual Refresh';
        }
      }
    }

    // =============================================
    // FORMAT SUBMISSION DATE
    // =============================================
    function formatSubmitDate(isoString) {
      if (!isoString) return '';
      try {
        const d = new Date(isoString);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleString('en-US', {
          month: 'short',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        });
      } catch (e) {
        return '';
      }
    }

    // =============================================
    // RENDER QUEUE
    // =============================================
    function renderQueue(jobs) {
      const tbody = document.getElementById('queueTableBody');
      const pendingEl = document.getElementById('pendingCount');

      const pendingCount = jobs.filter(j => (j.status || 'pending').toLowerCase() === 'pending').length;
      pendingEl.textContent = pendingCount;

      // Reset master checkbox and delete button
      const masterCb = document.getElementById('select-all-downloads');
      if (masterCb) masterCb.checked = false;
      updateDeleteBtnState();

      if (jobs.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7">
              <div class="empty-state">
                <span class="empty-icon">✅</span>
                <p>Queue is empty — all caught up!</p>
              </div>
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = jobs.map(job => {
        const status = (job.status || 'pending').toLowerCase();
        const badgeClass = getBadgeClass(status);
        const badgeLabel = capitalize(status);

        const { btnClass, btnLabel } = getActionButton(status);

        const childName   = escapeHtml(job.requestor_name || job.child_name || '—');
        const rawProject  = job.project_name || '—';
        const filament    = escapeHtml(job.color_preference || job.filament || '—');

        // Split project name from appended comment (separator: " | 📝 ")
        const separatorIdx = rawProject.indexOf(' | 📝 ');
        const projectTitle = escapeHtml(separatorIdx !== -1 ? rawProject.slice(0, separatorIdx) : rawProject);
        const projectNote  = separatorIdx !== -1 ? escapeHtml(rawProject.slice(separatorIdx + 6)) : '';

        // Model link — embedded below project title if stl_url is present
        const stlUrl = (job.stl_url || '').trim();
        const modelLinkHtml = stlUrl
          ? `<a href="${escapeAttr(stlUrl)}" target="_blank" rel="noopener noreferrer" class="model-link-btn">🔗 View Model</a>`
          : '';

        // Submission date — parsed from created_at
        const submitDateStr = formatSubmitDate(job.created_at);
        const submitDateHtml = submitDateStr
          ? `<span class="td-submit-date">🕐 ${submitDateStr}</span>`
          : '';

        // Assemble project cell
        const projectCell = [
          projectTitle,
          modelLinkHtml ? `<br>${modelLinkHtml}` : '',
          projectNote ? `<span class="td-project-note">📝 ${projectNote}</span>` : '',
          submitDateHtml
        ].join('');

        return `
          <tr id="row-${job.id}">
            <td class="td-checkbox">
              <input type="checkbox" class="job-checkbox" data-id="${job.id}" onchange="onCheckboxChange()">
            </td>
            <td class="td-name" data-field="requestor_name">${childName}</td>
            <td class="td-project" data-field="project_name">${projectCell}</td>
            <td class="td-filament" data-field="color_preference">${filament}</td>
            <td>
              <span class="status-badge ${badgeClass}">${badgeLabel}</span>
            </td>
            <td>
              <button
                class="action-btn ${btnClass}"
                id="btn-${job.id}"
                onclick="cycleStatus('${job.id}', '${status}', this)"
              >${btnLabel}</button>
            </td>
            <td>
              <button
                class="action-btn action-btn-edit"
                onclick="editRow('${job.id}', this)"
              >✏️ Edit</button>
            </td>
          </tr>`;
      }).join('');

      // Wire up master checkbox after render
      const masterCheckbox = document.getElementById('select-all-downloads');
      if (masterCheckbox) {
        masterCheckbox.onchange = function() {
          document.querySelectorAll('.job-checkbox').forEach(cb => {
            cb.checked = this.checked;
            const row = cb.closest('tr');
            if (row) row.classList.toggle('row-selected', this.checked);
          });
          updateDeleteBtnState();
        };
      }
    }

    // =============================================
    // CHECKBOX MANAGEMENT
    // =============================================
    function onCheckboxChange() {
      const allBoxes = document.querySelectorAll('.job-checkbox');
      const checkedBoxes = document.querySelectorAll('.job-checkbox:checked');
      const masterCb = document.getElementById('select-all-downloads');

      // Update row highlight
      allBoxes.forEach(cb => {
        const row = cb.closest('tr');
        if (row) row.classList.toggle('row-selected', cb.checked);
      });

      // Sync master checkbox state
      if (masterCb) {
        masterCb.checked = allBoxes.length > 0 && checkedBoxes.length === allBoxes.length;
        masterCb.indeterminate = checkedBoxes.length > 0 && checkedBoxes.length < allBoxes.length;
      }

      updateDeleteBtnState();
    }

    function updateDeleteBtnState() {
      const deleteBtn = document.getElementById('deleteSelectedBtn');
      if (!deleteBtn) return;
      const checkedCount = document.querySelectorAll('.job-checkbox:checked').length;
      deleteBtn.disabled = checkedCount === 0;
    }

    // =============================================
    // DELETE SELECTED (BATCH)
    // =============================================
    async function deleteSelected() {
      const checkedBoxes = document.querySelectorAll('.job-checkbox:checked');
      const ids = Array.from(checkedBoxes).map(cb => cb.dataset.id);

      if (ids.length === 0) return;

      const confirmed = confirm(`Are you sure you want to permanently delete the ${ids.length} selected print job${ids.length > 1 ? 's' : ''}?`);
      if (!confirmed) return;

      const deleteBtn = document.getElementById('deleteSelectedBtn');
      deleteBtn.disabled = true;
      deleteBtn.textContent = '⏳ Deleting...';

      try {
        const response = await fetch(`${window.PRINT_QUEUE_BASE}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': window.ADMIN_KEY
          },
          body: JSON.stringify({ ids })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Server returned ${response.status}`);
        }

        const result = await response.json();
        showToast(`🗑️ Deleted ${result.count} job${result.count !== 1 ? 's' : ''}`);
        await fetchQueue();

      } catch (err) {
        console.error('Batch delete failed:', err);
        showToast('❌ Delete failed: ' + err.message);
        deleteBtn.disabled = false;
        deleteBtn.textContent = '🗑️ Delete Selected';
      }
    }

    // =============================================
    // INLINE EDIT
    // =============================================
    function editRow(id, editBtn) {
      const row = document.getElementById(`row-${id}`);
      if (!row) return;

      // Editable fields: name, project, filament
      const editableFields = ['requestor_name', 'project_name', 'color_preference'];
      editableFields.forEach(field => {
        const td = row.querySelector(`td[data-field="${field}"]`);
        if (!td) return;
        const currentText = td.textContent.trim();
        td.innerHTML = `<input type="text" class="inline-edit-input" data-field="${field}" value="${escapeAttr(currentText)}">`;
      });

      // Swap Edit button for Save + Cancel
      const editTd = editBtn.closest('td');
      editTd.innerHTML = `
        <button class="action-btn action-btn-save" onclick="saveRow('${id}', this)">💾 Save</button>
        <button class="action-btn action-btn-cancel" style="margin-top:4px;" onclick="cancelEdit('${id}')">✖ Cancel</button>
      `;

      // Disable the status action button while editing
      const actionBtn = document.getElementById(`btn-${id}`);
      if (actionBtn) actionBtn.disabled = true;

      // Focus first input
      const firstInput = row.querySelector('.inline-edit-input');
      if (firstInput) firstInput.focus();
    }

    function cancelEdit(id) {
      // Re-fetch to restore original values cleanly
      fetchQueue();
    }

    async function saveRow(id, saveBtn) {
      const row = document.getElementById(`row-${id}`);
      if (!row) return;

      const inputs = row.querySelectorAll('.inline-edit-input');
      const payload = {};
      inputs.forEach(input => {
        payload[input.dataset.field] = input.value.trim();
      });

      saveBtn.disabled = true;
      saveBtn.textContent = '⏳ Saving...';

      try {
        const response = await fetch(`${window.PRINT_QUEUE_BASE}/${id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': window.ADMIN_KEY
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Server returned ${response.status}`);
        }

        showToast('✅ Job updated successfully');
        await fetchQueue();

      } catch (err) {
        console.error('Save failed:', err);
        showToast('❌ Save failed: ' + err.message);
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Save';
      }
    }

    // =============================================
    // CYCLE STATUS
    // =============================================
    async function cycleStatus(id, currentStatus, btn) {
      const nextStatus = getNextStatus(currentStatus);

      btn.disabled = true;
      btn.textContent = '⏳ Updating...';

      try {
        const response = await fetch(`${window.PRINT_QUEUE_BASE}/${id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': window.ADMIN_KEY
          },
          body: JSON.stringify({ status: nextStatus })
        });

        if (!response.ok) throw new Error(`Server returned ${response.status}`);

        // Update the row in-place without a full re-fetch
        const badgeClass = getBadgeClass(nextStatus);
        const { btnClass, btnLabel } = getActionButton(nextStatus);

        const row = document.getElementById(`row-${id}`);
        if (row) {
          const badge = row.querySelector('.status-badge');
          if (badge) {
            badge.className = `status-badge ${badgeClass}`;
            badge.textContent = capitalize(nextStatus);
          }
        }

        btn.className = `action-btn ${btnClass}`;
        btn.textContent = btnLabel;
        btn.disabled = false;
        btn.onclick = () => cycleStatus(id, nextStatus, btn);

        // Recount pending
        const allBadges = document.querySelectorAll('.status-badge');
        const pendingCount = Array.from(allBadges).filter(b => b.textContent.trim().toLowerCase() === 'pending').length;
        document.getElementById('pendingCount').textContent = pendingCount;

        showToast(`✅ Job → ${capitalize(nextStatus)}`);

      } catch (err) {
        console.error('Status update failed:', err);
        showToast('❌ Update failed');
        btn.disabled = false;
        const { btnClass, btnLabel } = getActionButton(currentStatus);
        btn.className = `action-btn ${btnClass}`;
        btn.textContent = btnLabel;
      }
    }

    // =============================================
    // AUTO-REFRESH TOGGLE
    // =============================================
    function toggleAutoRefresh() {
      const btn = document.getElementById('autoRefreshBtn');
      isAutoRefreshOn = !isAutoRefreshOn;

      if (isAutoRefreshOn) {
        autoRefreshInterval = setInterval(fetchQueue, 60000);
        btn.textContent = '🟢 Auto-Refresh: ON';
        btn.classList.add('auto-on');
        showToast('⏱️ Auto-refresh enabled (60s)');
      } else {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
        btn.textContent = '⚫ Auto-Refresh: OFF';
        btn.classList.remove('auto-on');
        showToast('Auto-refresh disabled');
      }
    }

    // =============================================
    // HELPERS
    // =============================================
    function getNextStatus(current) {
      const cycle = { pending: 'printing', printing: 'completed', completed: 'pending' };
      return cycle[current.toLowerCase()] || 'pending';
    }

    function getBadgeClass(status) {
      const map = { pending: 'status-pending', printing: 'status-printing', completed: 'status-completed' };
      return map[status.toLowerCase()] || 'status-pending';
    }

    function getActionButton(status) {
      const map = {
        pending:   { btnClass: 'action-btn-start',    btnLabel: '▶ Start Printing' },
        printing:  { btnClass: 'action-btn-complete', btnLabel: '✅ Mark Complete' },
        completed: { btnClass: 'action-btn-reset',    btnLabel: '🔄 Reset to Pending' }
      };
      return map[status.toLowerCase()] || map.pending;
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // =============================================
    // TOAST
    // =============================================
    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById('hub-toast');
      if (!toast) return;
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'show';
      toastTimer = setTimeout(() => { toast.className = ''; }, 2700);
    }

    // =============================================
    // INIT
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
      fetchQueue();
    });
  </script>

</body>
</html>
