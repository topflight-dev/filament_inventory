<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#28A745">
  <title>Crafted 3D | Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="Crafted 3D.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
</head>
<body class="admin-mobile">

  <header>
    <h1>Crafted 3D Workshop</h1>
    <p class="slogan">Mobile Admin Tool</p>
  </header>

  <nav>
    <ul>
      <li><a href="index.html" class="active">Admin</a></li>
      <li><a href="https://www.crafted3dworkshop.com/inventory.html" target="_blank">Live Inventory</a></li>
      <li><a href="https://www.crafted3dworkshop.com" target="_blank">Main Site</a></li>
    </ul>
  </nav>

  <div class="container">
    <main class="home-sections">

      <!-- Add New Filament -->
      <section class="admin-add-panel">
        <h2>➕ Add New Filament</h2>
        <form id="addFilamentForm">
          <div class="form-group">
            <label for="colorName">Color Name</label>
            <input type="text" id="colorName" list="existing-colors" placeholder="e.g., Galaxy Black" autocomplete="off" required>
            <datalist id="existing-colors"></datalist>
          </div>

          <div class="form-group">
            <label for="finish">Finish</label>
            <select id="finish" onchange="toggleNewFinishInput(this.value)">
              <option value="Matte">Matte</option>
              <option value="Silk">Silk</option>
              <option value="Satin">Satin</option>
              <option value="Solid">Solid</option>
              <option value="Galaxy">Galaxy</option>
              <option value="Translucent">Translucent</option>
              <option value="ADD_NEW">+ Add New Finish...</option>
            </select>
            <input type="text" id="newFinishInput" placeholder="Type new finish name..." style="display:none; margin-top:10px;">
          </div>

          <div class="form-group">
            <label>Primary Color</label>
            <div class="color-row">
              <input type="color" id="picker1" value="#3b82f6">
              <input type="text" id="text1" placeholder="#3B82F6">
            </div>
          </div>

          <div class="form-group">
            <label>Secondary Color <small>(optional)</small></label>
            <div class="color-row">
              <input type="color" id="picker2" value="#cccccc">
              <input type="text" id="text2" placeholder="Optional">
            </div>
          </div>

          <div class="form-group">
            <label>Tertiary Color <small>(optional)</small></label>
            <div class="color-row">
              <input type="color" id="picker3" value="#cccccc">
              <input type="text" id="text3" placeholder="Optional">
            </div>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="3" placeholder="Brief description..."></textarea>
          </div>

          <button type="submit" id="submitBtn" class="admin-btn admin-btn-green">⬆️ Upload to Site</button>
        </form>
      </section>

      <!-- Stats Panel -->
      <section class="admin-stats-panel">
        <h2>📊 Site Stats</h2>
        <div class="stat-grid">
          <div class="stat-box">
            <span class="stat-val" id="stat-today">—</span>
            <span class="stat-lbl">Today's Visits</span>
          </div>
          <div class="stat-box">
            <span class="stat-val" id="stat-total">—</span>
            <span class="stat-lbl">Total Visits</span>
          </div>
          <div class="stat-box">
            <span class="stat-val" id="stat-count">—</span>
            <span class="stat-lbl">Colors In Stock</span>
          </div>
        </div>
        <button id="statsRefreshBtn" class="admin-btn">🔄 Refresh Stats</button>
      </section>

      <!-- Quick Stock Toggle -->
      <section class="admin-inventory-panel">
        <h2>🎨 Manage Inventory</h2>
        <div class="admin-controls">
          <input type="text" id="adminSearchInput" placeholder="Search colors..." class="admin-search">
          <button id="adminRefreshBtn" class="admin-btn">🔄 Sync Colors</button>
        </div>
        <div id="adminInventoryResults"></div>
      </section>

    </main>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-top:0;">Edit Field</h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button type="button" class="admin-btn" onclick="closeModal()">Cancel</button>
        <button type="button" class="admin-btn admin-btn-blue" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <script>
    // --- CONFIG ---
    const API_BASE = "https://filament-inventory.onrender.com/inventory";
    const ADMIN_KEY = "CRAft3DW0RKSHOP-SuP3R-K3Y-2026";

    // --- COLOR PICKER SYNC ---
    const setupSync = (pickerId, textId) => {
      const picker = document.getElementById(pickerId);
      const text = document.getElementById(textId);
      if (!picker || !text) return;
      picker.addEventListener('input', () => { text.value = picker.value.toUpperCase(); });
      text.addEventListener('input', () => {
        if (/^#[0-9A-F]{6}$/i.test(text.value)) { picker.value = text.value; }
      });
    };
    setupSync('picker1', 'text1');
    setupSync('picker2', 'text2');
    setupSync('picker3', 'text3');

    // --- FINISH DROPDOWN ---
    async function populateFinishDropdown() {
      try {
        const response = await fetch(`${API_BASE}?cb=${Date.now()}`);
        if (!response.ok) throw new Error("Fetch failed");
        const data = await response.json();
        const standardFinishes = ["Matte", "Silk", "Satin", "Solid", "Galaxy", "Translucent"];
        const existingFinishes = Array.isArray(data)
          ? data.map(item => item.finish).filter(f => f && f.trim() !== "")
          : [];
        const combined = [...new Set([...standardFinishes, ...existingFinishes])].sort();
        const mainSelect = document.getElementById('finish');
        if (mainSelect) {
          mainSelect.innerHTML = combined.map(f =>
            `<option value="${f}">${f}</option>`
          ).join('') + '<option value="ADD_NEW">+ Add New Finish...</option>';
        }
        window.availableFinishes = combined;
      } catch (err) {
        console.error("Finish sync failed:", err);
      }
    }

    function toggleNewFinishInput(value) {
      const input = document.getElementById('newFinishInput');
      if (input) {
        input.style.display = (value === "ADD_NEW") ? "block" : "none";
        input.required = (value === "ADD_NEW");
        if (value === "ADD_NEW") input.focus();
      }
    }

    // --- STATS ---
    async function loadStats() {
      try {
        const response = await fetch('https://filament-inventory.onrender.com/api/stats', {
          headers: { 'x-api-key': ADMIN_KEY }
        });
        const data = await response.json();
        document.getElementById('stat-today').innerText = data.today ?? '—';
        document.getElementById('stat-total').innerText = data.total ?? '—';
      } catch (err) {
        console.error("Stats failed:", err);
      }
    }

    // --- INVENTORY FETCH & RENDER ---
    async function fetchForAdmin() {
      const btn = document.getElementById('adminRefreshBtn');
      if (btn) btn.innerText = "Syncing...";
      try {
        const response = await fetch(`${API_BASE}?cb=${Date.now()}`);
        if (!response.ok) throw new Error("Sync failed");
        const newData = await response.json();

        window.adminItems = newData.map(newItem => {
          const stringId = String(newItem.id);
          const pendingChange = localStorage.getItem(`pending_${stringId}`);
          if (pendingChange !== null) {
            return { ...newItem, inStock: (pendingChange === 'true') };
          }
          return newItem;
        });

        // Update stock count stat
        const inStockCount = window.adminItems.filter(i => i.inStock).length;
        document.getElementById('stat-count').innerText = inStockCount;

        const currentSearch = document.getElementById('adminSearchInput').value.toLowerCase();
        const filtered = window.adminItems.filter(i => i.color.toLowerCase().includes(currentSearch));
        renderAdminResults(filtered);

        const nameInput = document.getElementById('colorName');
        if (nameInput) renderDataList(nameInput.value);

      } catch (err) {
        console.error("Sync error:", err);
        showToast("❌ Sync failed");
      } finally {
        if (btn) btn.innerText = "🔄 Sync Colors";
      }
    }

    function renderAdminResults(items) {
      const container = document.getElementById('adminInventoryResults');
      if (!items || items.length === 0) {
        container.innerHTML = "<p style='color: gray; text-align:center; padding: 20px;'>No colors found. Tap Sync.</p>";
        return;
      }
      container.innerHTML = items.map(item => `
        <div class="admin-item ${item.inStock ? '' : 'out-of-stock'}">
          <div class="admin-item-info">
            <div class="admin-item-name">
              <strong>${item.color}</strong>
              <button type="button" onclick="openEditModal('${item.id}', 'color', '${item.color}')" class="edit-btn">Edit</button>
            </div>
            <div class="admin-item-finish">
              <small>Finish: ${item.finish}</small>
              <button type="button" onclick="openEditModal('${item.id}', 'finish', '${item.finish}')" class="edit-btn edit-btn-sm">Edit</button>
            </div>
          </div>
          <div class="admin-item-actions">
            <input type="checkbox" ${item.inStock ? 'checked' : ''} class="stock-toggle"
              onchange="toggleStock('${item.id}', this.checked)">
            <button onclick="deleteItem('${item.id}', '${item.color}')" class="delete-btn">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    // --- UPLOAD ---
    document.getElementById('addFilamentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nameInput = document.getElementById('colorName');
      const newName = nameInput.value.trim();
      const isDuplicate = (window.adminItems || []).some(item =>
        item.color.toLowerCase() === newName.toLowerCase()
      );
      if (isDuplicate) {
        showToast(`❌ "${newName}" already exists`);
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = "Uploading...";

      const finishSelect = document.getElementById('finish');
      const newFinishInput = document.getElementById('newFinishInput');
      let rawFinish = (finishSelect.value === "ADD_NEW") ? newFinishInput.value.trim() : finishSelect.value;
      if (!rawFinish) {
        showToast("Please provide a finish name.");
        submitBtn.disabled = false;
        submitBtn.innerText = "⬆️ Upload to Site";
        return;
      }
      const cleanFinish = rawFinish.charAt(0).toUpperCase() + rawFinish.slice(1).toLowerCase();

      const payload = {
        color: newName,
        finish: cleanFinish,
        description: document.getElementById('description').value,
        colorHex1: document.getElementById('text1').value || document.getElementById('picker1').value,
        colorHex2: document.getElementById('text2').value || "",
        colorHex3: document.getElementById('text3').value || "",
        inStock: true
      };

      try {
        const response = await fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": ADMIN_KEY },
          body: JSON.stringify(payload)
        });
        if (response.ok) {
          showToast("✅ Color added!");
          e.target.reset();
          newFinishInput.style.display = 'none';
          setTimeout(async () => {
            await fetchForAdmin();
            await populateFinishDropdown();
          }, 500);
        } else {
          const errorData = await response.json();
          showToast("Upload failed: " + JSON.stringify(errorData));
        }
      } catch (err) {
        showToast("❌ Network error.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "⬆️ Upload to Site";
      }
    });

    // --- STOCK TOGGLE ---
    async function toggleStock(id, currentState) {
      const stringId = String(id);
      if (window.adminItems) {
        const item = window.adminItems.find(i => String(i.id) === stringId);
        if (item) item.inStock = currentState;
      }
      localStorage.setItem(`pending_${stringId}`, String(currentState));

      const currentSearch = document.getElementById('adminSearchInput').value.toLowerCase();
      const filtered = window.adminItems.filter(i => i.color.toLowerCase().includes(currentSearch));
      renderAdminResults(filtered);

      const inStockCount = window.adminItems.filter(i => i.inStock).length;
      document.getElementById('stat-count').innerText = inStockCount;

      try {
        const response = await fetch(`${API_BASE}/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", "x-api-key": ADMIN_KEY },
          body: JSON.stringify({ inStock: currentState })
        });
        if (response.ok) {
          showToast(currentState ? "✅ In Stock" : "➖ Out of Stock");
          setTimeout(() => localStorage.removeItem(`pending_${stringId}`), 6000);
        } else {
          throw new Error("Server rejected update");
        }
      } catch (err) {
        console.error("Stock update failed:", err);
        showToast("❌ Sync Error");
        localStorage.removeItem(`pending_${stringId}`);
        await fetchForAdmin();
      }
    }

    // --- DELETE ---
    async function deleteItem(id, name) {
      if (!confirm(`Delete "${name}" permanently?`)) return;
      try {
        const response = await fetch(`${API_BASE}/${id}`, {
          method: "DELETE",
          headers: { "x-api-key": ADMIN_KEY }
        });
        if (response.ok) {
          showToast(`🗑️ "${name}" deleted`);
          fetchForAdmin();
        }
      } catch (err) {
        showToast("❌ Delete failed.");
      }
    }

    // --- EDIT MODAL ---
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function openEditModal(id, fieldName, currentVal) {
      const modal = document.getElementById('editModal');
      const modalBody = document.getElementById('modalBody');
      const title = document.getElementById('modalTitle');
      const saveBtn = document.getElementById('saveEditBtn');

      title.innerText = `Edit ${fieldName.charAt(0).toUpperCase() + fieldName.slice(1)}`;
      modalBody.innerHTML = '';

      if (fieldName === 'finish') {
        const select = document.createElement('select');
        select.id = 'modalInput';
        select.style.cssText = 'width:100%; padding:10px; font-size:16px; border:1px solid #ccc; border-radius:4px;';
        const finishes = window.availableFinishes || ["Matte", "Silk", "Satin", "Solid"];
        finishes.forEach(opt => {
          const el = document.createElement('option');
          el.value = opt; el.text = opt;
          if (opt === currentVal) el.selected = true;
          select.appendChild(el);
        });
        modalBody.appendChild(select);
      } else {
        const input = document.createElement('input');
        input.type = 'text'; input.id = 'modalInput';
        input.value = currentVal;
        input.style.cssText = 'width:100%; padding:10px; font-size:16px; border:1px solid #ccc; border-radius:4px; margin-top:10px; box-sizing:border-box;';
        modalBody.appendChild(input);
      }

      modal.style.display = 'flex';
      saveBtn.onclick = async () => {
        const newVal = document.getElementById('modalInput').value;
        if (!newVal || newVal.trim() === "") return;
        saveBtn.disabled = true;
        try {
          const response = await fetch(`${API_BASE}/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json", "x-api-key": ADMIN_KEY },
            body: JSON.stringify({ [fieldName]: newVal.trim() })
          });
          if (response.ok) {
            closeModal();
            showToast("✅ Saved");
            await fetchForAdmin();
          }
        } catch (err) {
          showToast("❌ Save failed.");
        } finally {
          saveBtn.disabled = false;
        }
      };
    }

    // --- DATALIST ---
    function renderDataList(query) {
      const datalist = document.getElementById('existing-colors');
      const nameInput = document.getElementById('colorName');
      if (!datalist || !nameInput) return;
      const cleanQuery = query.trim().toLowerCase();
      if (cleanQuery.length < 2) {
        datalist.innerHTML = '';
        nameInput.style.border = "1px solid #ccc";
        return;
      }
      const matches = (window.adminItems || []).filter(item => item.color.toLowerCase().includes(cleanQuery));
      datalist.innerHTML = matches.map(item => `<option value="${item.color}">`).join('');
      const exists = (window.adminItems || []).some(item => item.color.toLowerCase() === cleanQuery);
      nameInput.style.border = exists ? "2px solid #DC3545" : "1px solid #ccc";
    }

    // --- TOAST ---
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.innerText = message || "✅ Done";
      toast.className = "show";
      setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
    }

    // --- EVENT LISTENERS ---
    document.getElementById('colorName').addEventListener('input', (e) => renderDataList(e.target.value));
    document.getElementById('adminSearchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = (window.adminItems || []).filter(i => i.color.toLowerCase().includes(term));
      renderAdminResults(filtered);
    });
    document.getElementById('adminRefreshBtn').addEventListener('click', fetchForAdmin);
    document.getElementById('statsRefreshBtn').addEventListener('click', loadStats);

    // --- INIT ---
    window.addEventListener("DOMContentLoaded", async () => {
      await populateFinishDropdown();
      await fetchForAdmin();
      await loadStats();
    });
  </script>

  <script src="js/footer.js"></script>
</body>
</html>
